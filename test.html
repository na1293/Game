<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheet Data Viewer ⚡</title>
    <script src="JS/getData.js"></script>
    <style>
        /* CSS phong cách Modern Minimalist nhìn cho nghệ */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h2 {
            color: #1a1a1a;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .data-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }
        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c757d;
            font-weight: 600;
        }
        .value {
            font-size: 18px;
            font-weight: bold;
            color: #2b2b2b;
            margin-top: 5px;
            word-break: break-all; /* Tránh việc text dài quá làm vỡ giao diện */
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Sheet Data 📊</h2>
        
        <div class="data-box">
            <div class="label">📍 Ô thứ nhất (A2)</div>
            <div id="o-1" class="value">Đang đợi lệnh...</div>
        </div>

        <div class="data-box">
            <div class="label">📍 Ô thứ hai (B2)</div>
            <div id="o-2" class="value">Đang đợi lệnh...</div>
        </div>

        <button onclick="getTwoCellsData()">Update Data 🔄</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
