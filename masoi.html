<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận thẻ bài</title>
    <script src="JS/rand.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="content">
        <h1>Nhận thẻ bài của bạn</h1>
        <input type="number" id="player_num" min="4" max="11" placeholder="Nhập từ 4-11 người (Không tính quản trò)">
        
        <div class="card" id="card">
            <img id="card_img" src="" alt="Role Image" style="display: none;">
            <span id="card_text">Chưa bốc bài</span>
        </div>
        
        <button onclick="rand()">Nhận thẻ ngẫu nhiên</button>
    </div>
</body>
</html>
